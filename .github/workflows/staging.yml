name: deploy to staging

on: [push]

jobs:
  deploy:
    if: github.ref == 'refs/heads/staging'
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v1

      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@v1.0.0
        with:
            host: ${{ secrets.SERVER_IP_STAGING }}
            username: ${{ secrets.SERVER_USERNAME_STAGING }}
            password: ${{ secrets.SERVER_PASSWORD_STAGING }}
            script: cd ${{ secrets.PROJECT_PATH_STAGING }} && git remote set-url origin git@github.com:gamenic-nabin/job-matchy-api.git && git pull https://${{ secrets.GIT_USERNAME }}:${{ secrets.GIT_PASSWORD }}@github.com/gamenic-nabin/job-matchy-api.git staging

            
